server:
  port: 8082

spring:
  application:
    name: booking-service
  data:
    mongodb:
      # URI is injected at runtime via MONGODB_URI environment variable
      # For local dev: set in application-local.yml (gitignored)
      # For GKE: read from platform-secrets K8s Secret via Helm secretKeyRef
      uri: ${MONGODB_URI}
