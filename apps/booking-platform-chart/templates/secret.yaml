apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: platform-central
type: Opaque
stringData:
  # MongoDB Atlas connection URI for ingestion-service
  # This Secret is created manually (not committed to git) before running helm install:
  #
  #   kubectl create secret generic platform-secrets \
  #     --namespace platform-central \
  #     --from-literal=MONGODB_URI="mongodb+srv://<user>:<pass>@cluster0.xxx.mongodb.net/ingestiondb"
  #
  # Or apply this file after filling in the value:
  #   kubectl apply -f apps/booking-platform-chart/templates/secret.yaml
  MONGODB_URI: "REPLACE_BEFORE_APPLY"
